useGitignore: true
allowCompoundWords: true
ignorePaths:
  - _/git/
  - _/firefox/
  - _/starship/starship.toml
  - _/vim/vimrc
  - _/vscode/settings.json
  - biome.jsonc
  - Dockerfile
  - '*.dockerfile'
words:
  - cpus
  - chsh
  - clippy
  - ctison
  - fnox
  - ipsw
  - mkcd
  - nistp
  - nushell
  - nvim
  - osascript
  - pkgs
  - popd
  - pulumi
  - pushd
  - shopt
  - surrealdb
  - surrealkv
  - vimrc
ignoreRegExpList:
  - \bcom(\.\w+)+\b
  - \'aqua:\w+/\w+\'
