[tools]
bun = '1'
node = 'lts'
aqua = 'latest'
watchexec = 'latest'
fnox = 'latest'

[env]
_.path = ['{{config_root}}/node_modules/.bin']

[settings]
unix_default_file_shell_args = 'bash -euo pipefail -O nullglob'

[tasks.ci]
run = '''
bun install --frozen-lockfile
bun run format:check
bun run test
'''
